<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>go2town · Coma-ruga</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- The world: a Google Street View panorama (or a demo backdrop). -->
    <div id="world"></div>

    <!-- GTA-style minimap: a live Google map locked to the Street View, with
         mission pins. Hidden until it binds (Google worlds only). -->
    <div id="minimap" aria-hidden="true"></div>

    <!-- Start gate: needed to unlock audio (browser autoplay policy). -->
    <div id="start-gate" class="overlay">
      <div class="start-card">
        <div class="coco-big">🐦</div>
        <div class="start-title" aria-label="Go2Town Coma-ruga edition">
          <div class="game-title">Go2Town</div>
          <div class="edition-title">Coma-ruga edition</div>
        </div>
        <button id="start-btn" class="big-btn">▶</button>
        <div class="start-hint">🔊 sound on</div>
      </div>
    </div>

    <!-- Name modal: the one moment the learner types — their own name. -->
    <div id="name-modal" class="overlay hidden">
      <form id="name-form" class="name-card" autocomplete="off">
        <div class="coco-avatar" id="modal-avatar">🐦</div>
        <input
          id="name-input"
          class="name-input"
          type="text"
          maxlength="24"
          placeholder="🙂…"
          aria-label="your name"
          required
        />
        <button type="submit" class="big-btn">✓</button>
      </form>
    </div>

    <!-- Persistent narrator avatar (Coco) -->
    <div id="coco" class="coco-avatar floating hidden" title="Coco">🐦</div>

    <!-- Mission HUD: icons only, no written English. (Legacy linear-tour HUD;
         the free-roam map model leaves it hidden, but kept for reuse.) -->
    <div id="hud" class="hud">
      <div class="hud-target"><span id="hud-icon">🚉</span></div>
      <div class="hud-arrow-wrap"><span id="hud-arrow" class="hud-arrow">⬆️</span></div>
      <div class="hud-progress"><div id="hud-fill" class="hud-fill"></div></div>
    </div>

    <!-- Replay: always available. Hear the last thing Coco said again — the
         learner never reads English, so this is their way back to any message. -->
    <button id="replay-btn" class="replay-btn floating-replay" title="listen again">🔊</button>

    <!-- Points badge: total score across missions (icon-only progress). -->
    <div id="learn-stars" class="learn-stars" aria-label="points">⭐ 0</div>

    <!-- Dev caption (only shown when CONFIG.debug is true) -->
    <div id="caption" class="caption"></div>

    <!-- Dev panel (only shown when CONFIG.debug is true) -->
    <div id="dev-panel" class="dev-panel hidden">
      <button id="dev-arrive">⏭️ force arrive</button>
    </div>

    <!-- Hidden admin bookmarking session. Type q23r- as the player name. -->
    <section id="admin-panel" class="admin-panel hidden" aria-label="admin bookmarks">
      <div class="admin-head">
        <strong>Admin · pin spots</strong>
        <span id="admin-status">click the map to pin</span>
      </div>
      <div class="admin-form">
        <input id="admin-label" type="text" maxlength="48" placeholder="spot label (dev only)" aria-label="spot label" />
        <input id="admin-icon" type="text" maxlength="4" value="" placeholder="icon (auto)" aria-label="icon" />
        <select id="admin-subgame" aria-label="spot type">
          <option value="home">🏠 home</option>
          <option value="school">🏫 school</option>
          <option value="store">🏪 store</option>
          <option value="pizza">🍕 pizza place</option>
          <option value="icecream">🍦 ice cream</option>
          <option value="bakery">🥖 bakery</option>
          <option value="beach">🏖️ beach</option>
          <option value="park">🌳 park</option>
          <option value="friend">🧑 friend / person</option>
          <option value="portal-room">🚪 portal (future 2D room)</option>
        </select>
        <textarea id="admin-notes" rows="2" maxlength="240" placeholder="notes (optional)"></textarea>
        <button id="admin-add" type="button">＋ save pin here</button>
      </div>
      <div id="admin-list" class="admin-list"></div>
      <div class="admin-actions">
        <button id="admin-copy" type="button">copy JSON</button>
        <button id="admin-download" type="button">download JSON</button>
        <button id="admin-clear" type="button">clear</button>
      </div>
      <textarea id="admin-export" class="admin-export" rows="7" readonly aria-label="bookmark export"></textarea>
    </section>

    <script type="module" src="js/game.js"></script>
  </body>
</html>
